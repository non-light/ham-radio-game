function detect(txt){
  const t=txt.toLowerCase();
  return {
    isCQ:     /cq|こーきゅう|呼出/.test(t),
    isRST:    /rst|シグナル|信号|レポート|report|how copy/.test(t),
    isQTH:    /qth|どこ|場所|where|location/.test(t),
    isRig:    /rig|リグ|無線機|radio|machine/.test(t),
    isAnt:    /ant|アンテナ|antenna/.test(t),
    isName:   /名前|なまえ|name|who|お名前/.test(t),
    isQSL:    /qsl|カード|card|bureau|direct| bureau/.test(t),
    is73:     /73|sk|さようなら|バイ|bye|またね|ありがとう/.test(t),
    isWX:     /天気|weather|wx|気象|temp|温度/.test(t),
    isAge:    /年齢|歳|age|old|何歳/.test(t),
    isLicense:/免許|ライセンス|license|免許証|級|class/.test(t),
    isCW:     /cw|モールス|morse|電信/.test(t),
    isPwr:    /出力|power|watt|ワット|pw/.test(t),
  };
}

function generateReply(txt,op,band,mode,playerMode,turnCount){
  const d=detect(txt);
  const r=rst();
  const isBeg=playerMode==="beginner";
  const p=op.personality||"friendly";
  const sign=`DE ${op.call} K`;

  const topic=
    (d.isCQ||turnCount===0)?"greeting":
    (d.isQSL||d.is73)?      "qsl":
    d.isRST?                 "rst":
    d.isQTH?                 "qth":
    d.isRig?                 "rig":
    d.isAnt?                 "ant":
    d.isName?                "name_q":
    d.isWX?                  "wx":
    d.isLicense?             "license":
                             "generic";

  if(isBeg){
    if(topic==="greeting"){ const f=BEG_GREET[p]||BEG_GREET.friendly; return pick(f(op,r)); }
    if(topic==="qsl"){      const f=BEG_QSL[p]  ||BEG_QSL.friendly;   return pick(f(op)); }
    if(topic==="rst")     return `あなたのRST（信号レポート）は${r}です！\nRSTは「了解度・強度・音調」の3つを数字で表します。59が最高です。 ${sign}`;
    if(topic==="qth")     return `私のQTH（場所）は${op.qth_jp}です！\nQTHはQ符号で「場所」を意味します。UR QTH? ${sign}`;
    if(topic==="rig")     return `私のリグ（無線機）は${op.rig}です！\nあなたはどんなリグですか？ ${sign}`;
    if(topic==="ant")     return `アンテナは${op.ant}です！\nアンテナで飛び方が大きく変わりますよ！ ${sign}`;
    if(topic==="name_q")  return `私の名前は${op.name}です！よろしく！UR NAME? ${sign}`;
    if(topic==="wx")      return `天気（WX）は晴れ！コンディション（伝搬）も良好ですよ！ ${sign}`;
    if(topic==="license") return `アマチュア無線の免許を持っています。UR免許は？ ${sign}`;
    return pick([`なるほど！引き続き楽しく交信しましょう。 ${sign}`,`了解！（QSL＝了解の意）ありがとうございます。 ${sign}`,`素晴らしい！無線は世界と繋がれますよ。 ${sign}`]);
  }

  // 玄人モード: 個性全開
  const resp=EXPERT_RESP[p]?.[topic];
  if(resp) return pick(resp(op,r,mode));
  const gen=EXPERT_RESP[p]?.generic;
  if(gen) return pick(gen(op,r,mode));
  return `R FB TNX ${sign}`;
}

function SvgKnob({size=38, color="#8b6914", label="", active=false}){
  const id="kg"+label+size;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
      <svg width={size} height={size} viewBox="0 0 38 38">
        <defs>
          <radialGradient id={id} cx="38%" cy="32%">
            <stop offset="0%" stopColor={active?"#2a1a00":"#222218"}/>
            <stop offset="100%" stopColor="#080a06"/>
          </radialGradient>
        </defs>
        <circle cx="19" cy="19" r="17" fill="#0c1208" stroke={color+"33"} strokeWidth="2"/>
        <circle cx="19" cy="19" r="12" fill={`url(#${id})`} stroke={color+"77"} strokeWidth="1.5"/>
        <circle cx="19" cy="19" r="6" fill="#080a06" stroke={color+"33"} strokeWidth="1"/>
        <line x1="19" y1="9" x2="19" y2="15" stroke={active?color:color+"66"} strokeWidth="2.5" strokeLinecap="round"/>
        {[45,90,135,180,225,270,315].map((a,i)=>{
          const r2=a*Math.PI/180;
          const x1=19+14*Math.sin(r2),y1=19-14*Math.cos(r2);
          const x2=19+17*Math.sin(r2),y2=19-17*Math.cos(r2);
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={color+"33"} strokeWidth="0.8"/>;
        })}
      </svg>
      {label&&<span style={{fontSize:7,color:color+"99",fontFamily:"monospace",letterSpacing:1}}>{label}</span>}
    </div>
  );
}

function SvgSMeter({value=59, width=68}){
  const pct = Math.min(100,Math.max(0,(value-40)/30*100));
  const angle = -125 + pct*2.5;
  const rad = angle*Math.PI/180;
  const cx=width/2, cy=26;
  const r=19;
  const nx=cx+r*Math.cos(rad), ny=cy+r*Math.sin(rad);
  const col = pct>80?G.red:pct>55?G.amber:G.green;
  const h=32;
  return(
    <svg width={width} height={h} viewBox={`0 0 ${width} ${h}`}>
      <rect x="0.5" y="0.5" width={width-1} height={h-1} rx="3" fill="#050c05" stroke="#1a3a1a" strokeWidth="1"/>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#1a2a1a" strokeWidth="4"/>
      {[0,25,50,75,100].map(p=>{
        const a=(-125+p*2.5)*Math.PI/180;
        const x1=cx+(r-3)*Math.cos(a),y1=cy+(r-3)*Math.sin(a);
        const x2=cx+(r+1)*Math.cos(a),y2=cy+(r+1)*Math.sin(a);
        return <line key={p} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#2a4a2a" strokeWidth="1"/>;
      })}
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke={col+"55"} strokeWidth="2.5"/>
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={col} strokeWidth="1.5" strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      <text x={cx} y={h-1} textAnchor="middle" fill="#3a5a3a" fontSize="5.5" fontFamily="monospace">S-METER</text>
    </svg>
  );
}

function VUMeter({active}){
  const [bars,setBars]=useState(Array(7).fill(2));
  useEffect(()=>{
    if(!active){setBars(Array(7).fill(2));return;}
    const id=setInterval(()=>setBars(prev=>prev.map(()=>Math.floor(Math.random()*16)+2)),80);
    return()=>clearInterval(id);
  },[active]);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:2,height:20}}>
      {bars.map((h,i)=>(
        <div key={i} className="vb" style={{width:4,height:h,background:h>14?G.red:h>9?G.amber:G.green,borderRadius:1}}/>
      ))}
    </div>
  );
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {items.map(card=>{

          {Array(Math.max(0,BANDS.length-items.length)).fill(0).map((_,i)=>(
            <div key={`e${i}`} style={{border:`1px dashed ${G.panelBorder}`,borderRadius:4,padding:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{color:G.panelBorder,fontSize:22}}>?</span>
            </div>
          ))}
        </div>
        <button onClick={onClose} style={{marginTop:12,width:"100%",background:"transparent",border:`1px solid ${G.greenDim}`,color:G.greenDim,padding:8,borderRadius:2,cursor:"pointer",fontSize:12}}>閉じる</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// MAIN GAME
// ─────────────────────────────────────────────────────────────────
function App(){
  const [player,        setPlayer]        = useState(null);
  const [bandNPCs,      setBandNPCs]      = useState(randomizeBandNPCs);
  const [band,          setBand]          = useState(BANDS[0]);
  const [mode,          setMode]          = useState("SSB");
  const [messages,      setMessages]      = useState([]);
  const [input,         setInput]         = useState("");
  const [typing,        setTyping]        = useState(false);
  const [qslCollection, setQslCollection] = useState([]);
  const [showQSL,       setShowQSL]       = useState(null);
  const [showColl,      setShowColl]      = useState(false);
  const [sigStr,        setSigStr]        = useState(59);
  const [pendingQSL,    setPendingQSL]    = useState(false);
  const [qsoEnded,      setQsoEnded]      = useState(false);
  const turnRef  = useRef(0);
  const chatRef  = useRef(null);

  const startGame=(p)=>{ setBandNPCs(randomizeBandNPCs()); setPlayer(p); };
  const op = bandNPCs[band.id] || NPC_POOL[0];

  // スタート画面に戻る
  const resetGame=()=>{
    setPlayer(null);
    setMessages([]);
    setBand(BANDS[0]);
    setMode("SSB");
    setInput("");
    setPendingQSL(false);
    setQsoEnded(false);
    setShowQSL(null);
    setShowColl(false);
    turnRef.current=0;
  };

  useEffect(()=>{
    setMessages([]); turnRef.current=0; setPendingQSL(false); setQsoEnded(false);
    setSigStr(Math.floor(Math.random()*20)+50);
  },[band.id,mode]);

  useEffect(()=>{
    chatRef.current?.scrollTo({top:chatRef.current.scrollHeight,behavior:"smooth"});
  },[messages,typing]);

  const hints = player ? HINTS[player.playerMode](player.callsign) : [];
  const alreadyHasCard = qslCollection.find(c=>c.theirCall===op.call&&c.band===band.id);

  const sendMsg = useCallback(async(text)=>{
    const txt=(text??input).trim();
    if(!txt||typing) return;
    setInput("");

    const d=detect(txt);
    if(d.isQSL||d.is73) setPendingQSL(true);

    setMessages(p=>[...p,{role:"user",text:txt,ts:new Date()}]);
    setTyping(true);

    const delay = 600+Math.random()*800;
    await new Promise(r=>setTimeout(r,delay));

    const reply = generateReply(txt, op, band, mode, player.playerMode, turnRef.current);
    turnRef.current++;

    if(reply.toLowerCase().includes("qsl")||reply.toLowerCase().includes("bureau")||reply.toLowerCase().includes("sk")) setPendingQSL(true);
    if(/ sk\b/i.test(reply)||reply.includes("DE "+op.call+" SK")) setQsoEnded(true);
    setSigStr(Math.floor(Math.random()*20)+50);
    setMessages(p=>[...p,{role:"assistant",text:reply,ts:new Date()}]);
    setTyping(false);
  },[input,typing,op,band,mode,player]);

  const collectQSL=()=>{
    if(!pendingQSL||alreadyHasCard) return;
    const card={id:Date.now(),band:band.id,theirCall:op.call,myCall:player.callsign,qth:op.qth,mode,rst:`${sigStr}`,date:new Date().toLocaleDateString("ja-JP")};
    setQslCollection(p=>{
      const ex=p.find(c=>c.theirCall===card.theirCall&&c.band===card.band);
      return ex?p:[...p,card];
    });
    setShowQSL(card); setPendingQSL(false);
  };

  if(!player) return <Setup onDone={startGame}/>;

  return(<>
    <style>{css}</style>
    <div className="scanlines"/>

    {/* Outer radio panel wrapper */}
    <div className="crt" style={{
      height:"100dvh",
      display:"flex",
      flexDirection:"column",
      background:"linear-gradient(180deg,#1a2a1a 0%,#0d160d 4%,#0a0f0a 50%,#0d160d 96%,#1a2a1a 100%)",
      overflow:"hidden",
      position:"relative",
    }}>
      {/* Very subtle background image showing radio equipment on sides */}
      <div style={{
        position:"absolute",
        inset:0,
        backgroundImage:`url('${BG_IMG}')`,
        backgroundSize:"cover",
        backgroundPosition:"center",
        opacity:0.07,
        pointerEvents:"none",
        zIndex:0,
      }}/>

      {/* Top panel decoration */}
      {player&&<PanelDecoTop sigStr={sigStr} band={band} mode={mode} typing={typing}/>}

      {/* Main content area — styled as center CRT display */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1}}>

        {/* HEADER */}
        <div style={{background:"#0a1200",borderBottom:`1px solid ${G.panelBorder}`,padding:"5px 10px",flexShrink:0,borderLeft:`3px solid ${band.color}44`,borderRight:`3px solid ${band.color}44`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20}}>{op.avatar}</span>
              <div>
                <div className="glow-sm" style={{fontFamily:"'Orbitron',monospace",fontSize:13,color:band.color}}>{op.call}</div>
                <div style={{fontSize:10,color:G.gray}}>{op.qth}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                <div style={{fontSize:10,color:G.gray}}>SIG {sigStr} | QSL:<span style={{color:G.amber}}>{qslCollection.length}</span></div>
                <VUMeter active={typing}/>
              </div>
              {/* ホームに戻るボタン（常設） */}
              <button onClick={resetGame} title="スタート画面に戻る" style={{
                background:"transparent",
                border:`1px solid ${G.gray}44`,
                color:G.gray,
                fontSize:16,
                width:28,height:28,
                borderRadius:4,
                cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,
              }}>🏠</button>
            </div>
          </div>
          <div style={{display:"flex",gap:4,marginTop:6,overflowX:"auto",paddingBottom:2}}>
            {BANDS.map(b=>(
              <button key={b.id} onClick={()=>setBand(b)}
                style={{padding:"2px 7px",fontSize:10,cursor:"pointer",borderRadius:2,flexShrink:0,border:`1px solid ${b.color}55`,background:band.id===b.id?b.color:"transparent",color:band.id===b.id?G.bg:b.color,fontFamily:"'Orbitron',monospace",boxShadow:band.id===b.id?`0 0 8px ${b.color}`:undefined}}>
                {b.label}
              </button>
            ))}
            <select value={mode} onChange={e=>setMode(e.target.value)}
              style={{marginLeft:"auto",background:G.greenFaint,border:`1px solid ${G.greenDim}`,color:G.green,padding:"2px 4px",borderRadius:2,fontSize:10,cursor:"pointer",flexShrink:0}}>
              {MODES.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div style={{marginTop:4,fontSize:10,color:G.gray}}>
            📻 {band.freq}·{mode} <span style={{color:G.greenDim}}>{op.bio}</span>{" "}
            <span style={{fontSize:9,color:player.playerMode==="beginner"?G.cyan:G.amber}}>[{player.playerMode==="beginner"?"初心者":"玄人"}]</span>

                </div>
                <div style={{
                  background:"rgba(0,255,65,0.07)",
                  border:`1px solid ${G.green}44`,
                  borderRadius:12,

                  maxWidth:280,

                    lineHeight: isBeg?1.7:1.5,
                    whiteSpace:"pre-wrap",
                    boxShadow: isBeg&&isMe?`0 2px 8px rgba(0,255,65,0.15)`:"none",
                  }}>
                    {msg.text}
                  </div>
                  <div style={{fontSize:10,color:G.gray,marginTop:2,textAlign:isMe?"right":"left"}}>{msg.ts.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
                {isMe&&<span style={{fontSize:14,flexShrink:0}}>🎙️</span>}
              </div>
            );
          })}
          {typing&&<TypingBubble/>}

          {/* 交信終了バナー */}
          {qsoEnded&&!typing&&(
            <div style={{
              margin:"12px 10px 4px",
              background: player.playerMode==="beginner"
                ? "rgba(0,60,20,0.5)"
                : "rgba(0,30,10,0.6)",
              border:`1px solid ${G.green}55`,
              borderRadius: player.playerMode==="beginner" ? 12 : 4,
              padding:"12px 16px",
              display:"flex",
              flexDirection:"column",
              alignItems:"center",
              gap:8,
              flexShrink:0,
            }}>
              <div style={{fontSize:11,color:G.greenDim,textAlign:"center"}}>
                {player.playerMode==="beginner"
                  ? "🎉 交信（QSO）が終わりました！お疲れさまでした！"
                  : "✦ QSO COMPLETE — 73 de "+op.call}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
                <button onClick={resetGame} style={{
                  background:G.green,
                  color:G.bg,
                  border:"none",
                  padding: player.playerMode==="beginner" ? "8px 20px" : "6px 14px",
                  borderRadius: player.playerMode==="beginner" ? 20 : 2,
                  cursor:"pointer",
                  fontFamily:"'Orbitron',monospace",
                  fontSize: player.playerMode==="beginner" ? 13 : 11,
                  fontWeight:700,
                  boxShadow:`0 0 16px ${G.green}66`,
                  letterSpacing:1,
                }}>
                  {player.playerMode==="beginner" ? "🏠 スタートに戻る" : "🏠 HOME / QRT"}
                </button>
                <button onClick={()=>setQsoEnded(false)} style={{
                  background:"transparent",
                  color:G.gray,
                  border:`1px solid ${G.gray}44`,
                  padding: player.playerMode==="beginner" ? "8px 16px" : "6px 12px",
                  borderRadius: player.playerMode==="beginner" ? 20 : 2,
                  cursor:"pointer",
                  fontSize:11,
                }}>
                  {player.playerMode==="beginner" ? "続けて話す" : "続ける / CONTINUE"}
                </button>
              </div>
            </div>
          )}
        </div>

        {/* QSL BAR */}
        {(pendingQSL||qslCollection.length>0)&&(
          <div style={{background:"#080e08",borderTop:`1px solid ${G.panelBorder}`,padding:"5px 10px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            {pendingQSL&&!alreadyHasCard&&(
              <button onClick={collectQSL} style={{background:G.amber,color:G.bg,border:"none",padding:"4px 10px",borderRadius:2,fontSize:11,fontFamily:"'Orbitron',monospace",cursor:"pointer",boxShadow:`0 0 10px ${G.amber}66`}}>
                📮 QSLカード受け取る
              </button>
            )}
            {alreadyHasCard&&<span style={{fontSize:10,color:G.gray}}>✓ カード取得済み</span>}
            {qslCollection.length>0&&(
              <button onClick={()=>setShowColl(s=>!s)} style={{background:"transparent",color:G.cyan,border:`1px solid ${G.cyan}44`,padding:"4px 8px",borderRadius:2,fontSize:11,cursor:"pointer"}}>
                📁 ({qslCollection.length})
              </button>
            )}
          </div>
        )}

        {/* HINTS — 初心者はラベル、玄人はそのままのテキスト */}
        <div style={{background:"#080e08",borderTop:`1px solid ${G.panelBorder}`,padding:"6px 8px",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
          {hints.map((h,i)=>{
            const isBeg=player.playerMode==="beginner";
            const label=isBeg?h.label:h;
            const text =isBeg?h.text :h;
            return(
              <button key={i} className="hint-btn" onClick={()=>sendMsg(text)}
                style={{
                  background: isBeg?"rgba(0,255,65,0.1)":G.greenFaint,
                  border:`1px solid ${isBeg?G.green+"55":G.greenDim+"22"}`,
                  color: isBeg?G.green:G.greenDim,
                  padding: isBeg?"6px 12px":"3px 8px",
                  borderRadius: isBeg?20:2,
                  fontSize: isBeg?12:10,
                  cursor:"pointer",
                  whiteSpace:"nowrap",
                  flexShrink:0,
                  fontWeight: isBeg?"bold":"normal",
                }}>
                {label}
              </button>
            );
          })}
        </div>

        {/* INPUT */}
        <div style={{background:"#080e08",borderTop:`2px solid ${G.panelBorder}`,padding:"7px 10px",display:"flex",gap:8,flexShrink:0}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&sendMsg()}
            placeholder={player.playerMode==="beginner" ? "話しかけてみよう..." : `DE ${player.callsign} ... K`}
            style={{flex:1,background:G.greenFaint,border:`1px solid ${G.greenDim}`,color:G.green,padding:"9px 10px",borderRadius:player.playerMode==="beginner"?20:2,outline:"none",fontSize:13,minWidth:0}}
          />
          <button onClick={()=>sendMsg()} disabled={typing||!input.trim()}
            style={{background:typing?G.greenFaint:G.green,color:typing?G.greenDim:G.bg,border:"none",padding:"0 16px",borderRadius:player.playerMode==="beginner"?20:2,cursor:typing?"not-allowed":"pointer",fontFamily:"'Orbitron',monospace",fontSize:11,fontWeight:700,boxShadow:typing?"none":`0 0 10px ${G.green}66`,flexShrink:0}}>
            {player.playerMode==="beginner"?"送信":"TX"}
          </button>
        </div>
      </div>

      {/* Disclaimer */}
      <div style={{background:"#050905",borderTop:`1px solid #0a1a0a`,padding:"2px 10px",flexShrink:0,textAlign:"center"}}>
        <span style={{fontSize:9,color:"#2a3a2a",fontFamily:"monospace"}}>※ 登場するコールサインはすべて架空です。実在の局とは無関係です。</span>
      </div>

      {/* Bottom panel decoration */}
      {player&&<PanelDecoBottom playerCallsign={player.callsign} qth={player.qth} band={band}/>}
    </div>

    {showColl&&<Collection items={qslCollection} onShow={c=>{setShowQSL(c);setShowColl(false);}} onClose={()=>setShowColl(false)}/>}
    {showQSL&&<QSLCardPopup card={showQSL} onClose={()=>setShowQSL(null)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
